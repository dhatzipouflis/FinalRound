services:
  postgres:
    image: postgres:17-alpine
    container_name: finalround-local-postgres
    environment:
      POSTGRES_USER: finalround
      POSTGRES_PASSWORD: finalroundpass123!
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - finalround_local_postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finalround-local-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - finalround_local_redis_data:/data
    restart: unless-stopped

volumes:
  finalround_local_postgres_data:
  finalround_local_redis_data:
